<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link
      rel="preload"
      href="./fonts/static/Manrope-ExtraBold.ttf"
      as="font"
      type="font/ttf"
    />

    <link
      rel="preload"
      href="./fonts/static/Manrope-Medium.ttf"
      as="font"
      type="font/ttf"
    />

    <link
      rel="preload"
      href="./fonts/static/Manrope-Regular.ttf"
      as="font"
      type="font/ttf"
    />

    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="styles.css" />

    <title>Article preview component</title>
    <script defer src="./index.js"></script>
  </head>
  <body>
    <div class="card__component">
      <header class="card__header">
        <img
          src="./images/drawers.jpg"
          alt="Green drawers with vase"
          class="card__header__img"
        />
      </header>
      <main class="card__body">
        <section class="card__content">
          <p class="card__title">
            Shift the overall look and feel by adding these wonderful touches to
            furniture in your home
          </p>

          <p class="card__description">
            Ever been in a room and felt like something was missing? Perhaps it
            felt slightly bare and uninviting. I’ve got some simple tips to help
            you make any room feel complete.
          </p>
        </section>
      </main>
      <footer class="author">
        <img
          src="./images/avatar-michelle.jpg"
          alt="Michelle Appleton"
          class="author__img"
        />

        <div class="author__info">
          <span class="author__name">Michelle Appleton</span>
          <span class="author__date">28 Jun 2020</span>
        </div>

        <!-- Share button -->
        <div class="share__button__container">
          <button class="share_button">
            <img src="./images/icon-share.svg" alt="Share button" />
          </button>

          <!-- Share popup -->
          <div class="share_popup hide speech_bubble">
            <span class="share_text">SHARE</span>
            <a href="#"
              ><img src="./images/icon-facebook.svg" alt="Facebook"
            /></a>
            <a href="#"
              ><img src="./images/icon-twitter.svg" alt="Twitter"
            /></a>
            <a href="#"
              ><img src="./images/icon-pinterest.svg" alt="Pinterest"
            /></a>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
